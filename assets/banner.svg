<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#16243a"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#ec7211"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>

  <!-- grid de fondo, evoca infraestructura/red -->
  <g stroke="#2a3a55" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- nube estilo AWS, a la izquierda -->
  <g transform="translate(80,110)">
    <path d="M30 70
             a30 30 0 0 1 0 -60
             a40 40 0 0 1 78 -8
             a32 32 0 0 1 8 63.5
             Z"
          fill="url(#cloudGrad)"/>
    <!-- engranaje/gopher simplificado dentro: simboliza Go -->
    <circle cx="68" cy="36" r="11" fill="#16243a"/>
    <circle cx="68" cy="36" r="5" fill="#00ADD8"/>
  </g>

  <!-- nodos conectados, evocan servicios emulados -->
  <g fill="#00ADD8">
    <circle cx="950" cy="80" r="7"/>
    <circle cx="1020" cy="130" r="7"/>
    <circle cx="940" cy="190" r="7"/>
    <circle cx="1030" cy="60" r="5"/>
    <circle cx="1080" cy="160" r="6"/>
  </g>
  <g stroke="#3d5a80" stroke-width="2">
    <line x1="950" y1="80" x2="1020" y2="130"/>
    <line x1="1020" y1="130" x2="940" y2="190"/>
    <line x1="1020" y1="130" x2="1030" y2="60"/>
    <line x1="1020" y1="130" x2="1080" y2="160"/>
  </g>

  <!-- título -->
  <text x="240" y="140" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#f5f7fa">
    aws-emulator
  </text>
  <text x="240" y="180" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#9fb3c8">
    Emulador local de AWS en Go &#8212; S3 &middot; SQS &middot; IAM &middot; STS &middot; DynamoDB
  </text>

  <!-- pill "Go" -->
  <rect x="240" y="205" width="92" height="34" rx="17" fill="#00ADD8" opacity="0.15" stroke="#00ADD8"/>
  <text x="260" y="228" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#7fe3ff">Go 1.22+</text>

  <!-- pill "Fase 1" -->
  <rect x="346" y="205" width="118" height="34" rx="17" fill="#ff9900" opacity="0.15" stroke="#ff9900"/>
  <text x="366" y="228" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#ffc266">Fase 1 / N</text>
</svg>
